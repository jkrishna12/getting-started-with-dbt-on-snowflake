name: Incoming PR
run-name: PR opened by ${{ github.actor }}
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  run-snowflake-test-dbt-job:
    name: "Run on Incoming PR"
    runs-on: ubuntu-latest
    environment: prod # Must match the OIDC subject's environment
    env:
      SNOWFLAKE_CLI_FEATURES_ENABLE_DBT: true
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      # SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PAT }} # Snowflake password is required if you aren't using OIDC
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: 'TEST' #${{ vars.SNOWFLAKE_SCHEMA }}

    steps:
      # Check out repository code
      # Gets the latest code from the incoming pull request
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0
        with: # Ensures Snowflake CLI will search for OIDC users matching this subject
          use-oidc: true

      - name: Check Snowflake CLI Version
        run: snow --version

      # The -x is shorthand for --temporary-connection
      - run: snow connection test -x

      # Clone prod schema for testing
      - name: Clone all prod schemas with feature branch suffix
        run: |
          BRANCH_NAME=$(echo "${GITHUB_HEAD_REF}" | sed 's/[^a-zA-Z0-9]/_/g' | tr '[:lower:]' '[:upper:]')
          SCHEMAS=$(snow sql -x -q "SELECT SCHEMA_NAME FROM  
          ${{ vars.SNOWFLAKE_DATABASE }}.INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME LIKE 'PROD%';" --format csv)
          echo "All schemas identified: ${SCHEMAS}"
          for SCHEMA in $SCHEMAS; do
            echo "Currently processing schema: ${SCHEMA}"
            TARGET_SCHEMA = $(echo "${SCHEMA}" | sed "s/PROD/${SNOWFLAKE_SCHEMA}/")
            echo "Cloned target schema ${TARGET_SCHEMA}"
            snow sql -x -q "CREATE SCHEMA IF NOT EXISTS ${{ vars.SNOWFLAKE_DATABASE }}.${TARGET_SCHEMA}_${BRANCH_NAME} 
            CLONE ${{ vars.SNOWFLAKE_DATABASE }}.${SCHEMA};" 
          done

      # The --force setting creates the object or updates it if it already exists
      # You can remove the "--source" flag if your dbt_project.yml is at root of your repo
      - name: Create a new tester dbt project object in ${{ vars.SNOWFLAKE_DATABASE }}.${{ vars.SNOWFLAKE_SCHEMA }}
        run: snow dbt deploy tester_tasty_bytes_dbt_project_object_gh_action --source ./tasty_bytes_dbt_demo --dbt-version 1.10.15 --force -x

      - name: List all of the snowflake dbt project objects in your account
        run: snow dbt list -x

      # Builds all models and runs tests in DAG order, failing early if any upstream test breaks
      - name: Build and test dbt project in ${{ vars.SNOWFLAKE_DATABASE }}.${{ vars.SNOWFLAKE_SCHEMA }}
        run: snow dbt execute -x tester_tasty_bytes_dbt_project_object_gh_action build --target ci